document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle>\n  :root {\n    --accent-hue: 175;\n    --bg: #f3f1ea;\n    --surface: #ffffff;\n    --surface-2: #faf8f2;\n    --hair: #e6e2d6;\n    --hair-2: #efece2;\n    --ink: #1b1915;\n    --ink-2: #2e2a23;\n    --muted: #7a7468;\n    --muted-2: #aaa490;\n    --accent: oklch(0.52 0.07 var(--accent-hue));\n    --accent-soft: oklch(0.93 0.03 var(--accent-hue));\n    --alt: oklch(0.62 0.11 60);       /* warm amber for alt/what-if */\n    --alt-soft: oklch(0.95 0.04 70);\n    --target: oklch(0.55 0.13 25);    /* terracotta for target line */\n    --good: oklch(0.55 0.1 150);\n    --bad: oklch(0.55 0.16 28);\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { height: 100%; }\n  body {\n    font-family: 'Instrument Sans', system-ui, -apple-system, Helvetica, Arial, sans-serif;\n    background: var(--bg);\n    color: var(--ink);\n    font-size: 14px;\n    line-height: 1.45;\n    -webkit-font-smoothing: antialiased;\n    font-feature-settings: \"ss01\", \"cv11\";\n  }\n\n  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }\n  .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }\n  .num { font-variant-numeric: tabular-nums; }\n\n  /* App shell ------------------------------------------------------- */\n  .app {\n    display: grid;\n    grid-template-columns: 1fr 340px;\n    min-height: 100vh;\n  }\n\n  /* Left rail ------------------------------------------------------- */\n  .rail {\n    background: var(--surface);\n    border-left: 1px solid var(--hair);\n    padding: 28px 24px 32px;\n    position: sticky;\n    top: 0;\n    height: 100vh;\n    overflow-y: auto;\n    order: 2;\n  }\n  .main { order: 1; }\n\n  .rail-head { margin-bottom: 28px; }\n  .rail-eyebrow {\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 4px;\n  }\n  .rail-title { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }\n\n  .group { margin-bottom: 26px; }\n  .group-label {\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 14px;\n    padding-bottom: 8px;\n    border-bottom: 1px solid var(--hair-2);\n  }\n\n  .field { margin-bottom: 14px; }\n  .field-row {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    margin-bottom: 6px;\n  }\n  .field-label {\n    font-size: 13px;\n    color: var(--ink-2);\n  }\n  .field-value {\n    font-size: 13px;\n    color: var(--ink);\n    font-weight: 500;\n  }\n  .field-value .unit { color: var(--muted); font-weight: 400; margin-left: 1px; }\n\n  .num-input {\n    width: 100%;\n    border: 1px solid var(--hair);\n    background: var(--surface-2);\n    color: var(--ink);\n    padding: 9px 12px;\n    border-radius: 6px;\n    font: inherit;\n    font-family: 'JetBrains Mono', ui-monospace, monospace;\n    font-variant-numeric: tabular-nums;\n    font-size: 14px;\n    outline: none;\n    transition: border-color .12s, background .12s;\n  }\n  .num-input:focus { border-color: var(--accent); background: #fff; }\n  .num-input::-webkit-outer-spin-button,\n  .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }\n\n  /* Slider */\n  .slider-wrap { position: relative; padding: 4px 0 2px; }\n  input[type=\"range\"] {\n    -webkit-appearance: none;\n    appearance: none;\n    width: 100%;\n    height: 24px;\n    background: transparent;\n    cursor: pointer;\n  }\n  input[type=\"range\"]::-webkit-slider-runnable-track {\n    height: 2px;\n    background: var(--hair);\n    border-radius: 2px;\n  }\n  input[type=\"range\"]::-moz-range-track {\n    height: 2px;\n    background: var(--hair);\n    border-radius: 2px;\n  }\n  input[type=\"range\"]::-webkit-slider-thumb {\n    -webkit-appearance: none;\n    width: 16px;\n    height: 16px;\n    background: var(--ink);\n    border-radius: 50%;\n    margin-top: -7px;\n    border: 3px solid var(--surface);\n    box-shadow: 0 0 0 1px var(--ink);\n    transition: transform .12s;\n  }\n  input[type=\"range\"]::-moz-range-thumb {\n    width: 16px;\n    height: 16px;\n    background: var(--ink);\n    border-radius: 50%;\n    border: 3px solid var(--surface);\n    box-shadow: 0 0 0 1px var(--ink);\n  }\n  input[type=\"range\"]:focus::-webkit-slider-thumb { transform: scale(1.1); }\n  .slider-ticks {\n    display: flex;\n    justify-content: space-between;\n    font-size: 10px;\n    color: var(--muted-2);\n    font-family: 'JetBrains Mono', monospace;\n    margin-top: 2px;\n  }\n\n  /* Main column ----------------------------------------------------- */\n  .main {\n    padding: 28px 36px 40px;\n    max-width: 1280px;\n  }\n  .topbar {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-end;\n    margin-bottom: 24px;\n  }\n  .topbar-title {\n    font-family: 'Instrument Serif', Georgia, serif;\n    font-size: 30px;\n    letter-spacing: -0.01em;\n    color: var(--ink);\n    line-height: 1.1;\n  }\n  .topbar-sub {\n    color: var(--muted);\n    font-size: 13px;\n    margin-top: 4px;\n  }\n  .topbar-status {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 12px;\n    color: var(--muted);\n  }\n  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }\n\n  /* KPI tiles */\n  .kpis {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 1px;\n    background: var(--hair);\n    border: 1px solid var(--hair);\n    border-radius: 10px;\n    overflow: hidden;\n    margin-bottom: 24px;\n  }\n  .kpi {\n    background: var(--surface);\n    padding: 18px 20px 20px;\n  }\n  .kpi-label {\n    font-size: 11px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 12px;\n  }\n  .kpi-value {\n    font-family: 'Instrument Serif', Georgia, serif;\n    font-size: 36px;\n    letter-spacing: -0.01em;\n    line-height: 1;\n    color: var(--ink);\n    font-variant-numeric: tabular-nums;\n  }\n  .kpi-value .small {\n    font-size: 18px;\n    color: var(--muted);\n    margin-left: 2px;\n  }\n  .kpi-sub {\n    margin-top: 8px;\n    font-size: 12px;\n    color: var(--muted);\n    font-variant-numeric: tabular-nums;\n  }\n  .kpi-sub.good { color: var(--good); }\n  .kpi-sub.bad { color: var(--bad); }\n\n  /* Chart card */\n  .chart-card {\n    background: var(--surface);\n    border: 1px solid var(--hair);\n    border-radius: 10px;\n    padding: 20px 22px 16px;\n    margin-bottom: 20px;\n  }\n  .chart-head {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    margin-bottom: 14px;\n  }\n  .chart-title {\n    font-size: 13px;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .chart-legend {\n    display: flex;\n    gap: 18px;\n    font-size: 12px;\n    color: var(--ink-2);\n  }\n  .legend-swatch {\n    display: inline-block;\n    width: 18px;\n    height: 2px;\n    vertical-align: middle;\n    margin-right: 8px;\n    border-radius: 2px;\n  }\n  .chart-wrap {\n    position: relative;\n    height: 380px;\n  }\n  .chart-foot {\n    margin-top: 14px;\n    padding-top: 12px;\n    border-top: 1px solid var(--hair-2);\n    color: var(--muted);\n    font-size: 12px;\n    line-height: 1.5;\n  }\n  .chart-legend-foot {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 14px 18px;\n    margin-top: 14px;\n    padding-top: 12px;\n    border-top: 1px solid var(--hair-2);\n    font-size: 12px;\n    color: var(--ink-2);\n    align-items: center;\n  }\n  .chart-legend-foot .item {\n    display: inline-flex; align-items: center; gap: 7px;\n    padding: 4px 8px; border-radius: 6px;\n    white-space: nowrap;\n    transition: background 120ms ease, color 120ms ease;\n  }\n  .chart-legend-foot .item.hl {\n    background: var(--surface-2);\n    color: var(--ink);\n    box-shadow: inset 0 0 0 1px var(--hair);\n  }\n  .chart-legend-foot .glyph,\n  .chart-legend-foot .glyph-bar {\n    width: 20px; height: 20px; border-radius: 50%;\n    display: inline-flex; align-items: center; justify-content: center;\n    color: #fff; font-family: 'JetBrains Mono', monospace;\n    font-size: 11px; font-weight: 700; flex-shrink: 0;\n    line-height: 1;\n  }\n  .chart-legend-foot .yr { color: var(--muted); margin-left: 2px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }\n  .chart-legend-foot + .chart-foot { margin-top: 12px; padding-top: 12px; }\n\n  /* Lens tabs */\n  .lens-card {\n    background: var(--surface);\n    border: 1px solid var(--hair);\n    border-radius: 10px;\n    overflow: hidden;\n  }\n  .lens-tabs {\n    display: flex;\n    border-bottom: 1px solid var(--hair);\n    background: var(--surface-2);\n  }\n  .lens-tab {\n    flex: 1;\n    padding: 14px 16px;\n    background: transparent;\n    border: 0;\n    border-right: 1px solid var(--hair-2);\n    cursor: pointer;\n    text-align: left;\n    font: inherit;\n    color: var(--muted);\n    transition: background .12s, color .12s;\n  }\n  .lens-tab:last-child { border-right: 0; }\n  .lens-tab:hover { background: #fff; color: var(--ink-2); }\n  .lens-tab.active { background: var(--surface); color: var(--ink); }\n  .lens-tab.active .lens-tab-title { color: var(--ink); }\n  .lens-tab-title {\n    font-size: 12px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 4px;\n  }\n  .lens-tab-value {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 16px;\n    font-variant-numeric: tabular-nums;\n  }\n  .lens-body { padding: 22px 24px 26px; min-height: 220px; }\n\n  /* Timeline lens */\n  .timeline {\n    display: flex;\n    flex-direction: column;\n    gap: 0;\n  }\n  .timeline-row {\n    display: grid;\n    grid-template-columns: 80px 20px 1fr auto;\n    align-items: center;\n    gap: 14px;\n    padding: 12px 0;\n    border-bottom: 1px solid var(--hair-2);\n  }\n  .timeline-row:last  'JetBrains Mono', monospace;\n    font-variant-numeric: tabular-nums;\n    font-size: 17px;\n    color: var(--ink);\n  }\n\n  /* Withdrawal lens */\n  .income-grid {\n    display: grid;\n    grid-template-columns: 1.2fr 1fr;\n    gap: 32px;\n  }\n  .income-big {\n    font-family: 'Instrument Serif', Georgia, serif;\n    font-size: 56px;\n    line-height: 1;\n    letter-spacing: -0.02em;\n    color: var(--ink);\n    font-variant-numeric: tabular-nums;\n    margin-bottom: 6px;\n  }\n  .income-big .small { font-size: 24px; color: var(--muted); }\n  .income-sub { color: var(--muted); font-size: 14px; max-width: 42ch; }\n  .income-monthly {\n    margin-top: 18px;\n    padding-top: 16px;\n    border-top: 1px solid var(--hair-2);\n    font-family: 'JetBrains Mono', monospace;\n    font-variant-numeric: tabular-nums;\n    color: var(--ink-2);\n    font-size: 14px;\n  }\n  .income-monthly span { color: var(--ink); font-weight: 500; }\n\n  /* Education lens */\n  .edu-grid {\n    display: grid;\n    grid-template-columns: repeat(2, 1fr);\n    gap: 18px;\n  }\n  .edu-card {\n    border: 1px solid var(--hair);\n    border-radius: 8px;\n    padding: 18px 20px;\n    background: var(--surface-2);\n  }\n  .edu-name {\n    font-size: 12px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 10px;\n  }\n  .edu-years {\n    font-family: 'JetBrains Mono', monospace;\n    font-variant-numeric: tabular-nums;\n    font-size: 20px;\n    color: var(--ink);\n    margin-bottom: 6px;\n  }\n  .edu-detail { font-size: 13px; color: var(--muted); }\n\n  /* What-if lens */\n  .whatif-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 24px;\n    margin-bottom: 22px;\n  }\n  .scenario {\n    border: 1px solid var(--hair);\n    border-radius: 8px;\n    padding: 16px 18px 18px;\n    background: var(--surface-2);\n  }\n  .scenario.alt {\n    border-color: var(--alt);\n    background: var(--alt-soft);\n  }\n  .scenario-title {\n    font-size: 11px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 14px;\n    display: flex;\n    align-items: center;\n    gap: 8px;\n  }\n  .scenario.alt .scenario-title { color: var(--alt); }\n  .scenario-title .swatch {\n    width: 10px; height: 10px; border-radius: 50%; background: var(--accent);\n  }\n  .scenario.alt .scenario-title .swatch { background: var(--alt); }\n\n  .scenario-field { margin-bottom: 10px; }\n  .scenario-field-row {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    margin-bottom: 4px;\n  }\n  .scenario-field-label {\n    font-size: 12px;\n    color: var(--ink-2);\n  }\n  .scenario-field-value {\n    font-family: 'JetBrains Mono', monospace;\n    font-variant-numeric: tabular-nums;\n    font-size: 13px;\n    color: var(--ink);\n  }\n  .scenario-input {\n    width: 100%;\n    background: var(--surface);\n    border: 1px solid var(--hair);\n    padding: 8px 10px;\n    border-radius: 5px;\n    font: inherit;\n    font-family: 'JetBrains Mono', monospace;\n    font-variant-numeric: tabular-nums;\n    font-size: 13px;\n    color: var(--ink);\n  }\n  .scenario.alt .scenario-input:focus {\n    outline: none;\n    border-color: var(--alt);\n  }\n  .scenario-input:focus { outline: none; border-color: var(--accent); }\n  .scenario-readout {\n    background: var(--surface);\n    border: 1px solid var(--hair);\n    padding: 8px 10px;\n    border-radius: 5px;\n    font-family: 'JetBrains Mono', monospace;\n    font-variant-numeric: tabular-nums;\n    font-size: 13px;\n    color: var(--muted);\n  }\n\n  .delta-table {\n    width: 100%;\n    border-collapse: collapse;\n    font-size: 13px;\n  }\n  .delta-table th, .delta-table td {\n    text-align: right;\n    padding: 10px 12px;\n    border-bottom: 1px solid var(--hair-2);\n  }\n  .delta-table th:first-child, .delta-table td:first-child {\n    text-align: left;\n    color: var(--muted);\n  }\n  .delta-table th {\n    font-weight: 500;\n    color: var(--muted);\n    font-size: 11px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    padding-bottom: 8px;\n  }\n  .delta-table td.num {\n    font-family: 'JetBrains Mono', monospace;\n    color: var(--ink);\n  }\n  .delta-table .delta-good { color: var(--good); }\n  .delta-table .delta-bad { color: var(--bad); }\n\n  /* Tweaks panel */\n  .tweaks-panel {\n    position: fixed;\n    right: 20px;\n    bottom: 20px;\n    width: 280px;\n    background: var(--surface);\n    border: 1px solid var(--hair);\n    border-radius: 10px;\n    box-shadow: 0 12px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);\n    z-index: 50;\n    overflow: hidden;\n  }\n  .tweaks-head {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    padding: 12px 14px;\n    border-bottom: 1px solid var(--hair-2);\n    background: var(--surface-2);\n  }\n  .tweaks-title {\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .tweaks-close {\n    background: none; border: 0; cursor: pointer;\n    font-size: 18px; color: var(--muted); line-height: 1;\n    padding: 2px 6px;\n  }\n  .tweaks-close:hover { color: var(--ink); }\n  .tweaks-body { padding: 14px; display: grid; gap: 14px; }\n  .tweak-row {\n    display: grid;\n    grid-template-columns: 1fr auto;\n    align-items: center;\n    gap: 12px;\n  }\n  .tweak-row input[type=\"range\"] { width: 130px; }\n  .tweak-label { font-size: 13px; color: var(--ink-2); }\n  .swatch-row { display: flex; gap: 6px; }\n  .swatch-btn {\n    width: 22px; height: 22px; border-radius: 50%;\n    border: 2px solid var(--surface);\n    box-shadow: 0 0 0 1px var(--hair);\n    cursor: pointer;\n    transition: transform .12s;\n  }\n  .swatch-btn:hover { transform: scale(1.1); }\n  .swatch-btn.active { box-shadow: 0 0 0 2px var(--ink); }\n  .toggle { position: relative; display: inline-block; width: 32px; height: 18px; }\n  .toggle input { opacity: 0; width: 0; height: 0; }\n  .toggle span {\n    position: absolute; cursor: pointer; inset: 0;\n    background: var(--hair); border-radius: 999px;\n    transition: background .15s;\n  }\n  .toggle span::before {\n    content: ''; position: absolute;\n    width: 14px; height: 14px; left: 2px; top: 2px;\n    background: #fff; border-radius: 50%;\n    transition: transform .15s;\n  }\n  .toggle input:checked + span { background: var(--accent); }\n  .toggle input:checked + span::before { transform: translateX(14px); }\n  .compact .kpi-value { font-size: 26px; }\n  .compact .kpi { padding: 14px 16px 16px; }\n\n  /* Responsive */\n  @media (max-width: 1100px) {\n    .kpis { grid-template-columns: repeat(2, 1fr); }\n    .main { padding: 24px 24px 32px; }\n    .coast-grid, .income-grid, .whatif-grid { grid-template-columns: 1fr; gap: 22px; }\n  }\n  @media (max-width: 760px) {\n    .app { grid-template-columns: 1fr; }\n    .rail { position: static; height: auto; }\n    .edu-grid { grid-template-columns: 1fr; }\n    .lens-tabs { flex-wrap: wrap; }\n    .lens-tab { flex: 1 1 50%; border-bottom: 1px solid var(--hair-2); }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- Tweaks panel -->\n<div id=\"tweaksPanel\" class=\"tweaks-panel\" hidden=\"\">\n  <div class=\"tweaks-head\">\n    <div class=\"tweaks-title\">Tweaks<\u002Fdiv>\n    <button class=\"tweaks-close\" id=\"tweaksClose\" aria-label=\"Close\">×<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"tweaks-body\">\n    <div class=\"tweak-row\">\n      <div class=\"tweak-label\">Accent<\u002Fdiv>\n      <div class=\"swatch-row\" id=\"swatchRow\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tweak-row\">\n      <div class=\"tweak-label\">Show milestone bands<\u002Fdiv>\n      <label class=\"toggle\"><input type=\"checkbox\" id=\"tw-bands\" checked=\"\"><span><\u002Fspan><\u002Flabel>\n    <\u002Fdiv>\n    <div class=\"tweak-row\">\n      <div class=\"tweak-label\">Show target line<\u002Fdiv>\n      <l class=\"group\">\n      <div class=\"group-label\">Money<\u002Fdiv>\n\n      <div class=\"field\">\n        <div class=\"field-row\">\n          <span class=\"field-label\">Current portfolio<\u002Fspan>\n          <span class=\"field-value mono\">SGD<\u002Fspan>\n        <\u002Fdiv>\n        <input id=\"currentWealth\" class=\"num-input money\" type=\"text\" inputmode=\"numeric\" value=\"0\">\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <div class=\"field-row\">\n          <span class=\"field-label\">Monthly contribution<\u002Fspan>\n          <span class=\"field-value mono\">SGD<\u002Fspan>\n        <\u002Fdiv>\n        <input id=\"monthlyContribution\" class=\"num-input money\" type=\"text\" inputmode=\"numeric\" value=\"7000\">\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <div class=\"field-row\">\n          <span class=\"field-label\">Target wealth<\u002Fspan>\n          <span class=\"field-value mono\">SGD<\u002Fspan>\n        <\u002Fdiv>\n        <input id=\"targetWealth\" class=\"num-input money\" type=\"text\" inputmode=\"numeric\" value=\"5000000\">\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <div class=\"field-row\">\n          <span class=\"field-label\">Per-child uni (4 yrs)<\u002Fspan>\n          <span class=\"field-value mono\">SGD<\u002Fspan>\n        <\u002Fdiv>\n        <input id=\"educationCost\" class=\"num-input money\" type=\"text\" inputmode=\"numeric\" value=\"400000\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"group\">\n      <div class=\"group-label\">Loans<\u002Fdiv>\n\n      <div class=\"field\">\n        <div class=\"field-row\">\n          <span class=\"field-label\">Home mortgage ends<\u002Fspan>\n          <span class=\"field-value mono\">year<\u002Fspan>\n        <\u002Fdiv>\n        <input id=\"homeLoanEnd\" class=\"num-input\" type=\"number\" value=\"2042\" min=\"2026\" max=\"2060\" step=\"1\">\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <div class=\"field-row\">\n          <span class=\"field-label\">Car loan ends<\u002Fspan>\n          <span class=\"field-value mono\">year<\u002Fspan>\n        <\u002Fdiv>\n        <input id=\"carLoanEnd\" class=\"num-input\" type=\"number\" value=\"2029\" min=\"2026\" max=\"2060\" step=\"1\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"group\">\n      <div class=\"group-label\">Market<\u002Fdiv>\n\n      <div class=\"field\">\n        <div class=\"field-row\">\n          <span class=\"field-label\">Annual return<\u002Fspan>\n          <span class=\"field-value mono\"><span id=\"v-returnRate\">7.0<\u002Fspan>%<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"slider-wrap\">\n          <input id=\"returnRate\" type=\"range\" min=\"4\" max=\"12\" step=\"0.5\" value=\"7\">\n          <div class=\"slider-ticks\"><span>4%<\u002Fspan><span>12%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <div class=\"field-row\">\n          <span class=\"field-label\">Inflation<\u002Fspan>\n          <span class=\"field-value mono\"><span id=\"v-inflationRate\">2.5<\u002Fspan>%<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"slider-wrap\">\n          <input id=\"inflationRate\" type=\"range\" min=\"1\" max=\"5\" step=\"0.5\" value=\"2.5\">\n          <div class=\"slider-ticks\"><span>1%<\u002Fspan><span>5%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"field\">\n        <div class=\"field-row\">\n          <span class=\"field-label\">Real return<\u002Fspan>\n          <span class=\"field-value mono\"><span id=\"v-realReturn\">4.5<\u002Fspan>%<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- MAIN ============================================================ -->\n  <main class=\"main\">\n\n    <div class=\"topbar\">\n      <div>\n        <div class=\"topbar-title\">Path to Financial Independence<\u002Fdiv>\n        <div class=\"topbar-sub\">Live projection of your wealth from today through retirement.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"topbar-status\">\n        <span class=\"dot\"><\u002Fspan><span>Live · updates as you drag<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- KPI strip -->\n    <section class=\"kpis\">\n      <div class=\"kpi\">\n        <div class=\"kpi-label\">Wealth at retirement<\u002Fdiv>\n        <div class=\"kpi-value\">SGD <span id=\"kpi-retWealth\">0<\u002Fspan><span class=\"small\">M<\u002Fspan><\u002Fdiv>\n        <div class=\"kpi-sub\" id=\"kpi-retWealth-sub\">at age 50 · contributions stop<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi\">\n        <div class=\"kpi-label\">Years to target<\u002Fdiv>\n        <div class=\"kpi-value\"><span id=\"kpi-years\">0<\u002Fspan><span class=\"small\">yrs<\u002Fspan><\u002Fdiv>\n        <div class=\"kpi-sub\" id=\"kpi-years-sub\">on current pace<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi\">\n        <div class=\"kpi-label\">Target hit in<\u002Fdiv>\n        <div class=\"kpi-value\"><span id=\"kpi-targetYear\">—<\u002Fspan><\u002Fdiv>\n        <div class=\"kpi-sub\" id=\"kpi-targetYear-sub\">expected<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"kpi\">\n        <div class=\"kpi-label\">Buffer vs target<\u002Fdiv>\n        <div class=\"kpi-value\" id=\"kpi-buffer-wrap\"><span id=\"kpi-buffer\">0<\u002Fspan><span class=\"small\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"kpi-sub\" id=\"kpi-buffer-sub\">at retirement<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Chart -->\n    <section class=\"chart-card\">\n      <div class=\"chart-head\">\n        <div class=\"chart-title\">Wealth trajectory<\u002Fdiv>\n        <div class=\"chart-legend\">\n          <span><span class=\"legend-swatch\" style=\"background: var(--accent)\"><\u002Fspan>Current plan<\u002Fspan>\n          <span><span class=\"legend-swatch\" style=\"background: var(--alt); border-top: 2px dashed var(--alt); height: 0\"><\u002Fspan>What-if<\u002Fspan>\n          <span><span class=\"legend-swatch\" style=\"border-top: 2px dashed var(--target); height: 0; background: transparent\"><\u002Fspan>Target<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"chart-wrap\"><canvas id=\"wealthChart\"><\u002Fcanvas><\u002Fdiv>\n      <div class=\"chart-legend-foot\" id=\"chartLegendFoot\"><\u002Fdiv>\n      <div class=\"chart-foot\">\n        After retirement, contributions stop — the portfolio grows passively through market returns only.\n        Education costs are withdrawn during the shaded years.\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- Lens tabs -->\n    <section class=\"lens-card\">\n      <div class=\"lens-tabs\" role=\"tablist\">\n        <button class=\"lens-tab active\" data-lens=\"timeline\">\n          <div class=\"lens-tab-title\">Timeline<\u002Fdiv>\n          <div class=\"lens-tab-value\" id=\"tab-timeline\">Milestones<\u002Fdiv>\n        <\u002Fbutton>\n        <button class=\"lens-tab\" data-lens=\"coast\">\n          <div class=\"lens-tab-title\">Coast FIRE<\u002Fdiv>\n          <div class=\"lens-tab-value\" id=\"tab-coast\">—<\u002Fdiv>\n        <\u002Fbutton>\n        <button class=\"lens-tab\" data-lens=\"income\">\n          <div class=\"lens-tab-title\">4% Income<\u002Fdiv>\n          <div class=\"lens-tab-value\" id=\"tab-income\">—<\u002Fdiv>\n        <\u002Fbutton>\n        <button class=\"lens-tab\" data-lens=\"education\">\n          <div class=\"lens-tab-title\">Education<\u002Fdiv>\n          <div class=\"lens-tab-value\" id=\"tab-education\">2 kids<\u002Fdiv>\n        <\u002Fbutton>\n        <button class=\"lens-tab\" data-lens=\"whatif\">\n          <div class=\"lens-tab-title\">What-if<\u002Fdiv>\n          <div class=\"lens-tab-value\" id=\"tab-whatif\">Compare<\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- Timeline lens -->\n      <div class=\"lens-body\" data-lens-body=\"timeline\">\n        <div class=\"timeline\" id=\"timeline\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Coast lens -->\n      <div class=\"lens-body\" data-lens-body=\"coast\" hidden=\"\">\n        <div class=\"coast-grid\">\n          <div>\n            <div class=\"coast-headline\" id=\"coast-headline\">—<\u002Fdiv>\n            <p class=\"coast-body\">\n              \"Coasting\" means you've invested enough that even if you stopped contributing today,\n              compound growth alone would carry you to your target by retirement age.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div class=\"stat-stack\">\n            <div class=\"stat\">\n              <span class=\"stat-label\">Coast number needed today<\u002Fspan>\n              <span class=\"stat-value mono\" id=\"coast-needed\">—<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"stat\">\n              <span class=\"stat-label\">You'll reach it at<\u002Fspan>\n              <span class=\"stat-value mono\" id=\"coast-when\">—<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"stat\">\n              <span class=\"stat-label\">Then coast to retirement at<\u002Fspan>\n              <span class=\"stat-value mono\" id=\"coast-then\">—<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Income lens -->\n      <div class=\"lens-body\" data-lens-body=\"income\" hidden=\"\">\n        <div class=\"income-grid\">\n          <div>\n            <div class=\"income-big\">SGD <span id=\"income-annual\">0<\u002Fspan><\u002Fdiv>\n            <div class=\"income-sub\">\n              Annual income at retirement using the classic 4% safe withdrawal rule\n              — funds last 30+ years with typical market returns.\n            <\u002Fdiv>\n            <div class=\"income-monthly\">\n              That's <span id=\"income-monthly\" class=\"mono\">0<\u002Fspan> SGD / month.\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"stat-stack\">\n            <div class=\"stat\">\n              <span class=\"stat-label\">Portfolio at retirement<\u002Fspan>\n              <span class=\"stat-value mono\" id=\"income-portfolio\">—<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"stat\">\n              <span class=\"stat-label\">Real (inflation-adj) return<\u002Fspan>\n              <span class=\"stat-value mono\" id=\"income-real\">—<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"stat\">\n              <span class=\"stat-label\">Expected duration<\u002Fspan>\n              <span class=\"stat-value mono\">30+ years<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Education lens -->\n      <div class=\"lens-body\" data-lens-body=\"education\" hidden=\"\">\n        <div class=\"edu-grid\">\n          <div class=\"edu-card\">\n            <div class=\"edu-name\">Child 1 · born 2021<\u002Fdiv>\n            <div class=\"edu-years\" id=\"edu1-years\">2039 – 2042<\u002Fdiv>\n            <div class=\"edu-detail\">Ages 18–21 · 4 years of university · <span id=\"edu1-cost\">SGD 400,000<\u002Fspan> total<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"edu-card\">\n            <div class=\"edu-name\">Child 2 · born 2025<\u002Fdiv>\n            <div class=\"edu-years\" id=\"edu2-years\">2043 – 2046<\u002Fdiv>\n            <div class=\"edu-detail\">Ages 18–21 · 4 years of university · <span id=\"edu2-cost\">SGD 400,000<\u002Fspan> total<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"edu-card\" style=\"grid-column: 1 / -1; background: var(--accent-soft); border-color: var(--accent)\">\n            <div class=\"edu-name\" style=\"color: var(--accent)\">Combined impact<\u002Fdiv>\n            <div class=\"edu-years\" id=\"edu-total\">SGD 800,000<\u002Fdiv>\n            <div class=\"edu-detail\">Withdrawn from portfolio during years shown above. Already reflected in the trajectory chart.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- What-if lens -->\n      <div class=\"lens-body\" data-lens-body=\"whatif\" hidden=\"\">\n        <div class=\"whatif-grid\">\n          <div class=\"scenario\">\n            <div class=\"scenario-title\"><span class=\"swatch\"><\u002Fspan>Current plan<\u002Fdiv>\n            <div class=\"scenario-field\">\n              <div class=\"scenario-field-row\"><span class=\"scenario-field-label\">Monthly contribution<\u002Fspan><\u002Fdiv>\n              <div class=\"scenario-readout\" id=\"wi-base-monthly\">SGD 7,000<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"scenario-field\">\n              <div class=\"scenario-field-row\"><span class=\"scenario-field-label\">Retirement age<\u002Fspan><\u002Fdiv>\n              <div class=\"scenario-readout\" id=\"wi-base-ret\">50<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"scenario-field\">\n              <div class=\"scenario-field-row\"><span class=\"scenario-field-label\">Annual return<\u002Fspan><\u002Fdiv>\n              <div class=\"scenario-readout\" id=\"wi-base-return\">7.0%<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"scenario alt\">\n            <div class=\"scenario-title\"><span class=\"swatch\"><\u002Fspan>What if…<\u002Fdiv>\n            <div class=\"scenario-field\">\n              <div class=\"scenario-field-row\"><span class=\"scenario-field-label\">Monthly contribution (SGD)<\u002Fspan><\u002Fdiv>\n              <input class=\"scenario-input\" type=\"number\" id=\"altMonthly\" value=\"8000\" step=\"500\" min=\"0\">\n            <\u002Fdiv>\n            <div class=\"scenario-field\">\n              <div class=\"scenario-field-row\"><span class=\"scenario-field-label\">Retirement age<\u002Fspan><\u002Fdiv>\n              <input class=\"scenario-input\" type=\"number\" id=\"altRetirement\" value=\"48\" min=\"40\" max=\"70\">\n            <\u002Fdiv>\n            <div class=\"scenario-field\">\n              <div class=\"scenario-field-row\"><span class=\"scenario-field-label\">Annual return (%)<\u002Fspan><\u002Fdiv>\n              <input class=\"scenario-input\" type=\"number\" id=\"altReturn\" value=\"7.0\" step=\"0.5\" min=\"3\" max=\"15\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <table class=\"delta-table\">\n          <thead>\n            <tr><th>Outcome<\u002Fth><th>Current<\u002Fth><th>What-if<\u002Fth><th>Difference<\u002Fth><\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr>\n              <td>Years to target<\u002Ftd>\n              <td class=\"num\" id=\"wi-cur-years\">—<\u002Ftd>\n              <td class=\"num\" id=\"wi-alt-years\">—<\u002Ftd>\n              <td class=\"num\" id=\"wi-d-years\">—<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td>Wealth at retirement<\u002Ftd>\n              <td class=\"num\" id=\"wi-cur-ret\">—<\u002Ftd>\n              <td class=\"num\" id=\"wi-alt-ret\">—<\u002Ftd>\n              <td class=\"num\" id=\"wi-d-ret\">—<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td>Total contributed<\u002Ftd>\n              <td class=\"num\" id=\"wi-cur-inv\">—<\u002Ftd>\n              <td class=\"num\" id=\"wi-alt-inv\">—<\u002Ftd>\n              <td class=\"num\" id=\"wi-d-inv\">—<\u002Ftd>\n            <\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<script>\n/* =================================================================\n   Calc engine (preserved from original, lightly cleaned)\n   ================================================================= */\nconst CHILD1_BORN = 2021;\nconst CHILD2_BORN = 2025;\nconst CHILD1_UNI_START = CHILD1_BORN + 18;\nconst CHILD2_UNI_START = CHILD2_BORN + 18;\nconst HORIZON = 35;\n\nfunction calcScenario({ currentWealth, monthlyContribution, targetWealth, currentAge, retirementAge, returnRate, educationCost }) {\n  const monthlyRate = returnRate / 12;\n  const yearsToRetirement = retirementAge - currentAge;\n  const currentYear = new Date().getFullYear();\n  const annualEduCost = educationCost / 4;\n  const eduWithdrawals = {};\n  for (let i = 0; i < 4; i++) {\n    eduWithdrawals[CHILD1_UNI_START + i] = (eduWithdrawals[CHILD1_UNI_START + i] || 0) + annualEduCost;\n    eduWithdrawals[CHILD2_UNI_START + i] = (eduWithdrawals[CHILD2_UNI_START + i] || 0) + annualEduCost;\n  }\n\n  const wealthData = [];\n  const years = [];\n  let wealth = currentWealth;\n  let totalInvested = currentWealth;\n\n  wealthData.push(wealth);\n  years.push(currentYear);\n\n  for (let year = 1; year <= HORIZON; year++) {\n    const absoluteYear = currentYear + year;\n    for (let m = 0; m < 12; m++) {\n      if (year <= yearsToRetirement) {\n        wealth = wealth * (1 + monthlyRate) + monthlyContribution;\n        totalInvested += monthlyContribution;\n      } else {\n        wealth = wealth * (1 + monthlyRate);\n      }\n    }\n    if (eduWithdrawals[absoluteYear]) wealth -= eduWithdrawals[absoluteYear];\n    wealthData.push(wealth);\n    years.push(absoluteYear);\n  }\n\n  let yearsToTarget = HORIZON;\n  let targetYear = currentYear + HORIZON;\n  let targetReached = false;\n  for (let i = 0; i < wealthData.length; i++) {\n    if (wealthData[i] >= targetWealth) {\n      yearsToTarget = i;\n      targetYear = years[i];\n      targetReached = true;\n      break;\n    }\n  }\n\n  const retirementWealth = wealthData[yearsToRetirement] || wealthData[wealthData.length - 1];\n\n  return { wealthData, years, yearsToTarget, targetYear, targetReached, retirementWealth, totalInvested, yearsToRetirement };\n}\n\n/* =================================================================\n   Formatting\n   ================================================================= */\nfunction fmtShort(v) {\n  if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(2).replace(/\\.?0+$/, '') + 'M';\n  if (Math.abs(v) >= 1e3) return (v / 1e3).toFixed(0) + 'K';\n  return v.toFixed(0);\n}\nfunction fmtFull(v) { return Math.round(v).toLocaleString('en-SG'); }\nfunction fmtM(v) { return (v / 1e6).toFixed(2); }\nfunction fmtSigned(v, formatter = fmtShort) {\n  if (Math.abs(v) < 1) return '±0';\n  return (v > 0 ? '+' : '−') + formatter(Math.abs(v));\n}\n\n/* =================================================================\n   Chart\n   ================================================================= */\nlet chart = null;\n\nconst verticalMilestones = {\n  id: 'verticalMilestones',\n  afterDraw(c) {\n    const { ctx, chartArea, scales } = c;\n    if (!chartArea) return;\n    const points = c.options.plugins.verticalMilestones?.points || [];\n    const spans  = c.options.plugins.verticalMilestones?.spans  || [];\n    const labels = c.data.labels;\n    const hits = [];\n\n    // Spans first (so dots/lines render on top)\n    spans.forEach((s) => {\n      const { startYear, endYear, color, glyph } = s;\n      const i0 = labels.indexOf(startYear);\n      const i1 = labels.indexOf(endYear);\n      if (i0 < 0 || i1 < 0) return;\n      const x0 = scales.x.getPixelForValue(i0);\n      const x1 = scales.x.getPixelForValue(i1);\n      // tinted band across plot height\n      if ((window.TWEAKS || {}).showBands !== false) {\n        ctx.save();\n        ctx.fillStyle = color;\n        ctx.globalAlpha = 0.07;\n        ctx.fillRect(x0, chartArea.top, x1 - x0, chartArea.bottom - chartArea.top);\n        ctx.restore();\n      }\n      // solid bar at TOP of plot, level with the glyph chips\n      ctx.save();\n      ctx.fillStyle = color;\n      ctx.globalAlpha = 0.9;\n      ctx.fillRect(x0, chartArea.top, x1 - x0, 4);\n      ctx.restore();\n\n      // glyph chip centered above the span\n      if (glyph) {\n        const mx = (x0 + x1) / 2;\n        const by = chartArea.top - 22;\n        const w = 20, h = 16, r = 3;\n        const bx = mx - w / 2;\n        hits.push({ shape: 'rect', x: bx - 4, y: by - 4, w: w + 8, h: h + 8, key: s.key });\n        ctx.save();\n        ctx.fillStyle = color;\n        ctx.strokeStyle = '#fff';\n        ctx.lineWidth = 1.5;\n        ctx.beginPath();\n        ctx.moveTo(bx + r, by);\n        ctx.lineTo(bx + w - r, by);\n        ctx.quadraticCurveTo(bx + w, by, bx + w, by + r);\n        ctx.lineTo(bx + w, by + h - r);\n        ctx.quadraticCurveTo(bx + w, by + h, bx + w - r, by + h);\n        ctx.lineTo(bx + r, by + h);\n        ctx.quadraticCurveTo(bx, by + h, bx, by + h - r);\n        ctx.lineTo(bx, by + r);\n        ctx.quadraticCurveTo(bx, by, bx + r, by);\n        ctx.closePath();\n        ctx.fill();\n        ctx.stroke();\n        ctx.fillStyle = '#fff';\n        ctx.font = \"700 11px 'JetBrains Mono', monospace\";\n        ctx.textAlign = 'center';\n        ctx.textBaseline = 'middle';\n        ctx.fillText(glyph, mx, by + h / 2 + 0.5);\n        ctx.restore();\n      }\n    });\n\n    // Point milestones: dashed line + chip with glyph below the x-axis\n    points.forEach((p) => {\n      const { year, color, glyph } = p;\n      const idx = labels.indexOf(year);\n      if (idx < 0) return;\n      const x = scales.x.getPixelForValue(idx);\n      if (x < chartArea.left - 1 || x > chartArea.right + 1) return;\n\n      ctx.save();\n      ctx.setLineDash([3, 4]);\n      ctx.strokeStyle = color;\n      ctx.lineWidth = 1;\n      ctx.globalAlpha = 0.45;\n      ctx.beginPath();\n      ctx.moveTo(x, chartArea.top);\n      ctx.lineTo(x, chartArea.bottom);\n      ctx.stroke();\n      ctx.restore();\n\n      const cy = chartArea.top - 14;\n      const r = 10;\n      hits.push({ shape: 'circle', x, y: cy, r: r + 4, key: p.key });\n      ctx.save();\n      ctx.fillStyle = color;\n      ctx.strokeStyle = '#fff';\n      ctx.lineWidth = 1.5;\n      ctx.globalAlpha = 1;\n      ctx.beginPath();\n      ctx.arc(x, cy, r, 0, Math.PI * 2);\n      ctx.fill();\n      ctx.stroke();\n      if (glyph) {\n        ctx.fillStyle = '#fff';\n        ctx.font = \"700 11px 'JetBrains Mono', monospace\";\n        ctx.textAlign = 'center';\n        ctx.textBaseline = 'middle';\n        ctx.fillText(glyph, x, cy + 0.5);\n      }\n      ctx.restore();\n    });\n\n    c.$milestoneHits = hits;\n  }\n};\n\nfunction currentAgeFor(base) {\n  // pulls retirement age from inputs at render time\n  return (+document.getElementById('retirementAge').value || 50);\n}\nfunction renderChart(base, alt, targetWealth) {\n  const ctx = document.getElementById('wealthChart').getContext('2d');\n  if (chart) chart.destroy();\n\n  const css = getComputedStyle(document.documentElement);\n  const accent = css.getPropertyValue('--accent').trim();\n\n  const css2 = css;\n  const altCol = css2.getPropertyValue('--alt').trim();\n  const target = css2.getPropertyValue('--target').trim();\n  const ink = css2.getPropertyValue('--ink').trim();\n  const muted = css2.getPropertyValue('--muted').trim();\n  const hair = css2.getPropertyValue('--hair-2').trim();\n\n  const targetLine = base.years.map(() => targetWealth);\n\n  const datasets = [\n    {\n      label: 'Current plan',\n      data: base.wealthData,\n      borderColor: accent,\n      backgroundColor: ctx => {\n        const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 340);\n        g.addColorStop(0, 'oklch(0.52 0.07 175 / 0.18)');\n        g.addColorStop(1, 'oklch(0.52 0.07 175 / 0)');\n        return g;\n      },\n      borderWidth: 2,\n      fill: true,\n      tension: 0.35,\n      pointRadius: 0,\n      pointHoverRadius: 4,\n      pointHoverBackgroundColor: accent,\n      pointHoverBorderColor: '#fff',\n      pointHoverBorderWidth: 2,\n    },\n    {\n      label: 'Target',\n      data: targetLine,\n      borderColor: target,\n      backgroundColor: 'transparent',\n      borderWidth: 1.5,\n      borderDash: [4, 4],\n      pointRadius: 0,\n      fill: false,\n    }\n  ];\n\n  if (alt) {\n    datasets.splice(1, 0, {\n      label: 'What-if',\n      data: alt.wealthData,\n      borderColor: altCol,\n      backgroundColor: 'transparent',\n      borderWidth: 1.5,\n      borderDash: [6, 5],\n      pointRadius: 0,\n      fill: false,\n      tension: 0.35,\n    });\n  }\n\n  if ((window.TWEAKS || {}).showTarget === false) {\n    const idx = datasets.findIndex(d => d.label === 'Target');\n    if (idx >= 0) datasets.splice(idx, 1);\n  }\n\n  const currentYear = new Date().getFullYear();\n  const points = [];\n  const spans  = [];\n\n  const homeYr = +document.getElementById('homeLoanEnd').value || 0;\n  const carYr  = +document.getElementById('carLoanEnd').value || 0;\n  const horizonEnd = currentYear + HORIZON;\n\n  const retYear = currentYear + base.yearsToRetirement;\n  points.push({ year: retYear, key: 'retire', glyph: 'R', color: ink });\n  if (base.targetReached) points.push({ year: base.targetYear, key: 'target', glyph: 'T', color: target });\n  if (homeYr > currentYear && homeYr < horizonEnd) points.push({ year: homeYr, key: 'home', glyph: 'H', color: css.getPropertyValue('--accent').trim() });\n  if (carYr  > currentYear && carYr  < horizonEnd) points.push({ year: carYr,  key: 'car',  glyph: 'V', color: 'oklch(0.45 0.12 280)' });\n\n  if (CHILD1_UNI_START > currentYear && CHILD1_UNI_START + 3 < horizonEnd)\n    spans.push({ startYear: CHILD1_UNI_START, endYear: CHILD1_UNI_START + 3, key: 'c1', glyph: '1', color: altCol });\n  if (CHILD2_UNI_START > currentYear && CHILD2_UNI_START + 3 < horizonEnd)\n    spans.push({ startYear: CHILD2_UNI_START, endYear: CHILD2_UNI_START + 3, key: 'c2', glyph: '2', color: altCol });\n\n  // Render the foot legend (out-of-chart labels)\n  const legend = document.getElementById('chartLegendFoot');\n  if (legend) {\n    const items = [];\n    items.push({ key: 'retire', swatch: 'glyph', glyph: 'R', color: ink, label: 'Retire', year: retYear });\n    if (base.targetReached) items.push({ key: 'target', swatch: 'glyph', glyph: 'T', color: target, label: 'Target hit', year: base.targetYear });\n    if (homeYr > currentYear && homeYr < horizonEnd) items.push({ key: 'home', swatch: 'glyph', glyph: 'H', color: css.getPropertyValue('--accent').trim(), label: 'Home loan ends', year: homeYr });\n    if (carYr  > currentYear && carYr  < horizonEnd) items.push({ key: 'car', swatch: 'glyph', glyph: 'V', color: 'oklch(0.45 0.12 280)', label: 'Car loan ends', year: carYr });\n    if (CHILD1_UNI_START > currentYear && CHILD1_UNI_START + 3 < horizonEnd) items.push({ key: 'c1', swatch: 'glyph-bar', glyph: '1', color: altCol, label: 'Child 1 · uni', year: CHILD1_UNI_START + '–' + (CHILD1_UNI_START + 3) });\n    if (CHILD2_UNI_START > currentYear && CHILD2_UNI_START + 3 < horizonEnd) items.push({ key: 'c2', swatch: 'glyph-bar', glyph: '2', color: altCol, label: 'Child 2 · uni', year: CHILD2_UNI_START + '–' + (CHILD2_UNI_START + 3) });\n    legend.innerHTML = items.map(it =>\n      `<span class=\"item\" data-mskey=\"${it.key}\"><span class=\"${it.swatch}\" style=\"background:${it.color}\">${it.glyph}<\u002Fspan>${it.label}<span class=\"yr\">${it.year}<\u002Fspan><\u002Fspan>`\n    ).join('');\n  }\n\n  chart = new Chart(ctx, {\n    type: 'line',\n    plugins: [verticalMilestones],\n    data: { labels: base.years, datasets },\n    options: {\n      responsive: true,\n      maintainAspectRatio: false,\n      interaction: { mode: 'index', intersect: false },\n      plugins: {\n        legend: { display: false },\n        tooltip: {\n          backgroundColor: '#1b1915',\n          titleColor: '#fff',\n          bodyColor: '#e6e2d6',\n          borderColor: '#1b1915',\n          titleFont: { family: \"'Instrument Sans', sans-serif\", size: 12, weight: '500' },\n          bodyFont: { family: \"'JetBrains Mono', monospace\", size: 11 },\n          padding: 10,\n          cornerRadius: 6,\n          displayColors: true,\n          boxWidth: 8,\n          boxHeight: 8,\n          callbacks: {\n            title: items => items[0].label,\n            label: c => ` ${c.dataset.label}: SGD ${fmtFull(c.parsed.y)}`,\n          },\n        },\n        verticalMilestones: { points, spans },\n      },\n      layout: { padding: { top: 56, bottom: 8 } },\n      scales: {\n        x: {\n          grid: { display: false },\n          border: { color: hair },\n          ticks: {\n            color: muted,\n            font: { family: \"'JetBrains Mono', monospace\", size: 10 },\n            maxRotation: 0,\n            autoSkipPadding: 24,\n          },\n        },\n        y: {\n          beginAtZero: true,\n          grid: { color: hair, drawBorder: false },\n          border: { display: false },\n          ticks: {\n            color: muted,\n            font: { family: \"'JetBrains Mono', monospace\", size: 10 },\n            padding: 8,\n            callback: v => 'SGD ' + (v / 1e6).toFixed(1) + 'M',\n          },\n        },\n      },\n    },\n  });\n\n  // Hover on a glyph → highlight matching legend item\n  const canvas = chart.canvas;\n  const legendEl = document.getElementById('chartLegendFoot');\n  function hitTest(x, y) {\n    const hits = chart.$milestoneHits || [];\n    for (const h of hits) {\n      if (h.shape === 'circle') {\n        const dx = x - h.x, dy = y - h.y;\n        if (dx*dx + dy*dy <= h.r*h.r) return h.key;\n      } else if (h.shape === 'rect') {\n        if (x >= h.x && x <= h.x + h.w && y >= h.y && y <= h.y + h.h) return h.key;\n      }\n    }\n    return null;\n  }\n  function clearHl() {\n    if (!legendEl) return;\n    legendEl.querySelectorAll('.item.hl').forEach(el => el.classList.remove('hl'));\n  }\n  canvas.onmousemove = (e) => {\n    const rect = canvas.getBoundingClientRect();\n    const x = (e.clientX - rect.left) * (canvas.width / rect.width) / (window.devicePixelRatio || 1);\n    const y = (e.clientY - rect.top) * (canvas.height / rect.height) / (window.devicePixelRatio || 1);\n    const key = hitTest(x, y);\n    clearHl();\n    if (key && legendEl) {\n      const el = legendEl.querySelector(`.item[data-mskey=\"${key}\"]`);\n      if (el) el.classList.add('hl');\n      canvas.style.cursor = 'pointer';\n    } else {\n      canvas.style.cursor = '';\n    }\n  };\n  canvas.onmouseleave = () => { clearHl(); canvas.style.cursor = ''; };\n}\n\n/* =================================================================\n   Render\n   ================================================================= */\nfunction $(id) { return document.getElementById(id); }\n\nfunction parseMoney(el) {\n  return parseInt(String(el.value).replace(/[^0-9-]/g, ''), 10) || 0;\n}\nfunction formatMoney(n) {\n  return (parseInt(String(n).replace(/[^0-9-]/g, ''), 10) || 0).toLocaleString('en-SG');\n}\n\nfunction readInputs() {\n  return {\n    currentWealth: parseMoney($('currentWealth')),\n    monthlyContribution: parseMoney($('monthlyContribution')),\n    targetWealth: parseMoney($('targetWealth')),\n    currentAge: +$('currentAge').value || 30,\n    retirementAge: +$('retirementAge').value || 50,\n    returnRate: +$('returnRate').value / 100,\n    inflationRate: +$('inflationRate').value / 100,\n    educationCost: parseMoney($('educationCost')),\n  };\n}\n\n// Format money inputs with commas while preserving caret position\ndocument.querySelectorAll('input.money').forEach(el => {\n  el.value = formatMoney(el.value);\n  el.addEventListener('input', (e) => {\n    const before = el.value;\n    const caret = el.selectionStart;\n    const digitsBeforeCaret = (before.slice(0, caret).match(/\\d/g) || []).length;\n    const formatted = formatMoney(before);\n    el.value = formatted;\n    // restore caret by counting digits\n    let pos = 0, seen = 0;\n    while (pos < formatted.length && seen < digitsBeforeCaret) {\n      if (/\\d/.test(formatted[pos])) seen++;\n      pos++;\n    }\n    el.setSelectionRange(pos, pos);\n    render();\n  });\n});\n\nfunction render() {\n  const i = readInputs();\n\n  // Rail readouts\n  $('v-currentAge').textContent = i.currentAge;\n  $('v-retirementAge').textContent = i.retirementAge;\n  $('v-returnRate').textContent = ($('returnRate').value * 1).toFixed(1);\n  $('v-inflationRate').textContent = ($('inflationRate').value * 1).toFixed(1);\n  $('v-realReturn').textContent = (i.returnRate * 100 - i.inflationRate * 100).toFixed(1);\n\n  const base = calcScenario(i);\n\n  // Alt scenario\n  const alt = calcScenario({\n    ...i,\n    monthlyContribution: +$('altMonthly').value || 0,\n    retirementAge: +$('altRetirement').value || 50,\n    returnRate: +$('altReturn').value / 100,\n  });\n\n  // KPIs\n  $('kpi-retWealth').textContent = fmtM(base.retirementWealth);\n  $('kpi-retWealth-sub').textContent = `at age ${i.retirementAge} · contributions stop`;\n  $('kpi-years').textContent = base.yearsToTarget;\n  $('kpi-years-sub').textContent = base.targetReached ? 'on current pace' : 'target not hit in 35 yrs';\n  $('kpi-targetYear').textContent = base.targetReached ? base.targetYear : '—';\n  $('kpi-targetYear-sub').textContent = base.targetReached ? `you'll be ${i.currentAge + base.yearsToTarget}` : 'extend horizon';\n\n  const bufferAmt = base.retirementWealth - i.targetWealth;\n  const bufferPct = i.targetWealth > 0 ? (bufferAmt / i.targetWealth * 100) : 0;\n  $('kpi-buffer').textContent = (bufferPct >= 0 ? '+' : '−') + Math.abs(bufferPct).toFixed(0);\n  const bufSub = $('kpi-buffer-sub');\n  if (bufferAmt >= 0) {\n    bufSub.textContent = `SGD ${fmtShort(bufferAmt)} above target`;\n    bufSub.className = 'kpi-sub good';\n  } else {\n    bufSub.textContent = `SGD ${fmtShort(Math.abs(bufferAmt))} below target`;\n    bufSub.className = 'kpi-sub bad';\n  }\n\n  // Tab summaries\n  const coastNumber = i.targetWealth / Math.pow(1 + i.returnRate, i.retirementAge - i.currentAge);\n  let coastAge = null;\n  if (i.currentWealth >= coastNumber) {\n    coastAge = i.currentAge;\n  } else {\n    let w = i.currentWealth;\n    for (let age = i.currentAge; age <= i.retirementAge; age++) {\n      if (w >= coastNumber) { coastAge = age; break; }\n      w = w * (1 + i.returnRate) + i.monthlyContribution * 12;\n    }\n  }\n\n  $('tab-coast').textContent = coastAge ? `Age ${coastAge}` : 'Not yet';\n  $('tab-income').textContent = `SGD ${fmtShort(i.targetWealth * 0.04)}/yr`;\n  $('tab-whatif').textContent = `${fmtSigned(alt.yearsToTarget - base.yearsToTarget, v => v.toFixed(1))} yrs`;\n  $('tab-timeline').textContent = `${base.yearsToRetirement} yrs ahead`;\n\n  // Coast lens\n  if (coastAge === i.currentAge && i.currentWealth >= coastNumber) {\n    $('coast-headline').innerHTML = `You can <em>coast<\u002Fem> from today.`;\n  } else if (coastAge) {\n    $('coast-headline').innerHTML = `You'll be able to coast at <em>age ${coastAge}<\u002Fem>.`;\n  } else {\n    $('coast-headline').innerHTML = `Coasting isn't reachable before retirement.`;\n  }\n  $('coast-needed').textContent = `SGD ${fmtShort(coastNumber)}`;\n  $('coast-when').textContent = coastAge ? `Age ${coastAge}` : '—';\n  $('coast-then').textContent = `Age ${i.retirementAge}`;\n\n  // Income lens\n  $('income-annual').textContent = fmtFull(i.targetWealth * 0.04);\n  $('income-monthly').textContent = fmtFull(i.targetWealth * 0.04 / 12);\n  $('income-portfolio').textContent = `SGD ${fmtShort(base.retirementWealth)}`;\n  $('income-real').textContent = `${(i.returnRate * 100 - i.inflationRate * 100).toFixed(1)}%`;\n\n  // Education lens\n  $('edu1-cost').textContent = `SGD ${fmtFull(i.educationCost)}`;\n  $('edu2-cost').textContent = `SGD ${fmtFull(i.educationCost)}`;\n  $('edu-total').textContent = `SGD ${fmtFull(i.educationCost * 2)}`;\n  $('edu1-years').textContent = `${CHILD1_UNI_START} – ${CHILD1_UNI_START + 3}`;\n  $('edu2-years').textContent = `${CHILD2_UNI_START} – ${CHILD2_UNI_START + 3}`;\n\n  // What-if lens\n  $('wi-base-monthly').textContent = `SGD ${fmtFull(i.monthlyContribution)}`;\n  $('wi-base-ret').textContent = i.retirementAge;\n  $('wi-base-return').textContent = (i.returnRate * 100).toFixed(1) + '%';\n\n  $('wi-cur-years').textContent = `${base.yearsToTarget} yrs`;\n  $('wi-alt-years').textContent = ase.retirementWealth)}`,\n    sign: '+',\n  });\n  const annualEdu = i.educationCost / 4;\n  for (let k = 0; k < 4; k++) {\n    if (CHILD1_UNI_START + k > currentYear && CHILD1_UNI_START + k < currentYear + HORIZON) {\n      items.push({\n        year: CHILD1_UNI_START + k,\n        age: CHILD1_UNI_START + k - CHILD1_BORN,\n        kind: 'education',\n        event: `Child 1 · university year ${k + 1}`,\n        amount: `SGD ${fmtShort(annualEdu)}`,\n        sign: '−',\n      });\n    }\n    if (CHILD2_UNI_START + k > currentYear && CHILD2_UNI_START + k < currentYear + HORIZON) {\n      items.push({\n        year: CHILD2_UNI_START + k,\n        age: CHILD2_UNI_START + k - CHILD2_BORN,\n        kind: 'education',\n        event: `Child 2 · university year ${k + 1}`,\n        amount: `SGD ${fmtShort(annualEdu)}`,\n        sign: '−',\n      });\n    }\n  }\n  items.sort((a, b) => a.year - b.year);\n  // Add mortgage milestones to timeline\n  const homeY = +$('homeLoanEnd').value || 0;\n  const carY  = +$('carLoanEnd').value  || 0;\n  if (homeY > currentYear && homeY < currentYear + HORIZON) {\n    items.push({ year: homeY, age: i.currentAge + (homeY - currentYear), kind: 'retirement', event: 'Home mortgage paid off', amount: 'Cashflow boost', sign: '+' });\n  }\n  if (carY > currentYear && carY < currentYear + HORIZON) {\n    items.push({ year: carY, age: i.currentAge + (carY - currentYear), kind: 'retirement', event: 'Car loan paid off', amount: 'Cashflow boost', sign: '+' });\n  }\n  items.sort((a, b) => a.year - b.year);\n  for (const m of items) {\n    const row = document.createElement('div');\n    row.className = 'timeline-row';\n    row.innerHTML = `\n      <div>\n        <div class=\"timeline-year\">${m.year}<\u002Fdiv>\n        <div class=\"timeline-age\">age ${m.age}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"timeline-dot ${m.kind}\"><\u002Fdiv>\n      <div class=\"timeline-event\">${m.event}<\u002Fdiv>\n      <div class=\"timeline-amount ${m.sign === '−' ? 'minus' : ''}\">${m.sign}${m.amount}<\u002Fdiv>`;\n    tl.appendChild(row);\n  }\n\n  renderChart(base, alt, i.targetWealth);\n}\n\n/* =================================================================\n   Tabs\n   ================================================================= */\ndocument.querySelectorAll('.lens-tab').forEach(tab => {\n  tab.addEventListener('click', () => {\n    document.querySelectorAll('.lens-tab').forEach(t => t.classList.remove('active'));\n    tab.classList.add('active');\n    const name = tab.dataset.lens;\n    document.querySelectorAll('[data-lens-body]').forEach(b => {\n      b.hidden = b.dataset.lensBody !== name;\n    });\n  });\n});\n\n/* =================================================================\n   Bind & init\n   ================================================================= */\n['currentAge', 'retirementAge', 'returnRate', 'inflationRate', 'altMonthly', 'altRetirement', 'altReturn',\n 'homeLoanEnd', 'carLoanEnd'\n].forEach(id => $(id).addEventListener('input', render));\n// (money inputs already wired up above with their own listener)\n\nrender();\n\n/* =================================================================\n   Tweaks panel\n   ================================================================= */\nconst TWEAKS = /*EDITMODE-BEGIN*/{\n  \"accentHue\": 145,\n  \"showBands\": true,\n  \"showTarget\": true,\n  \"compact\": false,\n  \"chartHeight\": 380\n}/*EDITMODE-END*/;\n\nconst SWATCHES = [\n  { hue: 175, name: 'Teal' },\n  { hue: 250, name: 'Indigo' },\n  { hue: 25,  name: 'Terracotta' },\n  { hue: 145, name: 'Olive' },\n];\n\nfunction applyTweaks() {\n  window.TWEAKS = TWEAKS;\n  document.documentElement.style.setProperty('--accent-hue', TWEAKS.accentHue);\n  document.body.classList.toggle('compact', TWEAKS.compact);\n  document.querySelector('.chart-wrap').style.height = TWEAKS.chartHeight + 'px';\n  document.querySelectorAll('.swatch-btn').forEach(b => {\n    b.classList.toggle('active', +b.dataset.hue === TWEAKS.accentHue);\n  });\n  $('tw-bands').checked = TWEAKS.showBands;\n  $('tw-target').checked = TWEAKS.showTarget;\n  $('tw-compact').checked = TWEAKS.compact;\n  $('tw-height').value = TWEAKS.chartHeight;\n  render();\n}\n\nfunction persistTweaks(patch) {\n  Object.assign(TWEAKS, patch);\n  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*'); } catch (e) {}\n  applyTweaks();\n}\n\nconst swatchRow = $('swatchRow');\nSWATCHES.forEach(s => {\n  const b = document.createElement('button');\n  b.className = 'swatch-btn';\n  b.dataset.hue = s.hue;\n  b.title = s.name;\n  b.style.background = `oklch(0.52 0.09 ${s.hue})`;\n  b.addEventListener('click', () => persistTweaks({ accentHue: s.hue }));\n  swatchRow.appendChild(b);\n});\n\n$('tw-bands').addEventListener('change', e => persistTweaks({ showBands: e.target.checked }));\n$('tw-target').addEventListener('change', e => persistTweaks({ showTarget: e.target.checked }));\n$('tw-compact').addEventListener('change', e => persistTweaks({ compact: e.target.checked }));\n$('tw-height').addEventListener('input', e => persistTweaks({ chartHeight: +e.target.value }));\n\nconst panel = $('tweaksPanel');\nfunction showPanel() { panel.hidden = false; }\nfunction hidePanel() {\n  panel.hidden = true;\n  try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (e) {}\n}\n$('tweaksClose').addEventListener('click', hidePanel);\nwindow.addEventListener('message', (e) => {\n  if (e.data?.type === '__activate_edit_mode') showPanel();\n  else if (e.data?.type === '__deactivate_edit_mode') panel.hidden = true;\n});\ntry { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}\n\napplyTweaks();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
